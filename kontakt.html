<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontakt | ERGO GYM</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
--primary: #fefb00;
--black: #111111;
--dark-grey: #121212;
--card-bg: #1a1a1a;
--input-bg: #222222;
--white: #ffffff;
--text-muted: #888;
}
* {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Montserrat', sans-serif;
    }

    html, body {
        overflow-x: hidden;
        background-color: var(--black);
        color: var(--white);
        line-height: 1.6;
    }
            html::-webkit-scrollbar {
            display: none;
        }


            html {
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }

    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 22px 8%; 
        background: rgba(10, 10, 10, 0.95);
        backdrop-filter: blur(10px);
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        transition: 0.3s ease;
    }

    nav .logo {
        font-weight: 900;
        font-size: 32px;
        text-decoration: none;
        color: var(--white);
        text-transform: uppercase;
    }

    nav .logo span { color: var(--primary); }

    nav ul { 
        display: flex; 
        list-style: none; 
        gap: 40px; 
        align-items: center;
    }

    nav ul li a {
        color: var(--white);
        text-decoration: none;
        text-transform: uppercase;
        font-size: 17px;
        font-weight: 800;
        letter-spacing: 1px;
        transition: 0.3s;
    }

    nav ul li a:hover { color: var(--primary); }
    nav ul li a.active { color: var(--primary); }

    .hamburger {
        display: none;
        cursor: pointer;
        flex-direction: column;
        gap: 7px;
        z-index: 3001;
        padding: 5px;
    }

    .hamburger span {
        display: block;
        width: 32px;
        height: 3px;
        background-color: var(--white);
        transition: 0.3s;
        border-radius: 2px;
    }

    .hamburger.active span:nth-child(1) { transform: translateY(10px) rotate(45deg); background-color: var(--primary); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); background-color: var(--primary); }

    .contact-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 160px 20px 60px 20px;
    }

    .contact-container h1 {
        text-align: center;
        font-size: 42px;
        font-weight: 900;
        text-transform: uppercase;
        margin-bottom: 50px;
        letter-spacing: -1px;
    }

    .contact-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
        margin-bottom: 30px;
    }

    .info-card {
        background: var(--card-bg);
        padding: 50px;
        border-radius: 15px;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
    }

    .info-item {
        margin-bottom: 40px;
    }

    .info-label {
        color: var(--primary);
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 15px;
        display: block;
    }

    .info-value {
        font-size: 26px;
        font-weight: 700;
        color: var(--white);
        line-height: 1.3;
    }

    .social-icons {
        position: absolute;
        bottom: 30px;
        right: 30px;
        display: flex;
        gap: 15px;
    }

    .social-btn {
        width: 45px;
        height: 45px;
        background: #252525;
        color: var(--white);
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        border-radius: 8px;
        font-size: 18px;
        transition: 0.3s;
    }

    .social-btn:hover {
        background: var(--primary);
        color: var(--black);
    }

    .form-container {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .form-container input, .form-container textarea {
        width: 100%;
        padding: 20px;
        background: var(--input-bg);
        border: 1px solid transparent;
        color: var(--white);
        border-radius: 8px;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
    }

    .form-container input:focus, .form-container textarea:focus {
        border-color: #444;
    }

    .form-container textarea {
        min-height: 240px;
        resize: none;
    }

    .submit-btn {
        width: 100%;
        padding: 20px;
        background: var(--primary);
        color: var(--black);
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 900;
        text-transform: uppercase;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 5px;
    }

    .submit-btn:hover {
        background: var(--white);
    }

    .map-wrapper {
        width: 100%;
        height: 450px;
        border-radius: 15px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.05);
    }

    .map-wrapper iframe {
        width: 100%;
        height: 100%;
        filter: invert(90%) hue-rotate(180deg) brightness(95%);
    }

    footer { 
        text-align: center; 
        padding: 30px 30px; 
        color: #444; 
        font-size: 12px; 
        background: var(--black);
        border-top: 1px solid rgba(255,255,255,0.05);
    }

    .footer-logo {
        font-weight: 900;
        font-size: 24px;
        text-decoration: none;
        color: var(--white);
        text-transform: uppercase;
        display: block;
        margin-bottom: 15px;
    }

    .footer-logo span { color: var(--primary); }

    @media (max-width: 992px) {
        .hamburger { display: flex; }
        nav ul {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            height: 100vh;
            background: #0a0a0a;
            flex-direction: column;
            justify-content: center;
            gap: 40px;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: -15px 0 40px rgba(0,0,0,0.9);
            z-index: 3000;
        }
        nav ul.active { right: 0; }
        nav ul li a { font-size: 24px; }
        .contact-grid { grid-template-columns: 1fr; }
        .info-card { padding: 40px 30px; }
        .social-icons { position: static; margin-top: 20px; justify-content: flex-end; }
    }

    @media (max-width: 600px) {
        .contact-container h1 { font-size: 32px; }
        .info-value { font-size: 22px; }
        .map-wrapper { height: 300px; }
    }
</style>
</head>
<body>
<nav>
    <a href="index.html" class="logo">ERGO <span>GYM</span></a>
    <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
    </div>
    <ul id="nav-links">
        <li><a href="index.html">Domov</a></li>
        <li><a href="galeria.html">Galéria</a></li>
        <li><a href="kontakt.html" class="active">Kontakt</a></li>
    </ul>
</nav>

<div class="contact-container">
    <h1>Kontaktujte <span style="color:#fefb00;">nás</span></h1>
    
    <div class="contact-grid">
        <div class="info-card">
            <div class="info-item">
                <span class="info-label">KDE NÁS NÁJDETE?</span>
                <div class="info-value">Kazanská 4,<br>821 06 Biskupice</div>
            </div>
            <div class="info-item">
                <span class="info-label">TELEFÓN</span>
                <div class="info-value">0902 696 732</div>
            </div>
            <div class="info-item">
                <span class="info-label">EMAIL</span>
                <div class="info-value">info@ergogym.sk</div>
            </div>
            <div class="social-icons">
                <a href="https://www.facebook.com/ergogym4" target="_blank" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/ergo_gym/" target="_blank" class="social-btn"><i class="fab fa-instagram"></i></a>
            </div>
        </div>

        <form id="contact-form" class="form-container">
            <input type="text" name="meno" placeholder="Vaše meno" required>
            <input type="email" name="email" placeholder="Váš Email" required>
            <textarea name="sprava" placeholder="Vaša správa..." required></textarea>
            <button type="submit" class="submit-btn">Odoslať správu</button>
        </form>
    </div>

    <div class="map-wrapper">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2663.784776100236!2d17.2023537!3d48.1143896!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x476c88ca4d92416f%3A0x6b4c102a90100902!2sKazansk%C3%A1%204!5e0!3m2!1ssk!2ssk!4v1700000000000" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </div>
</div>

<footer>
    <div class="footer-logo">ERGO <span>GYM</span></div>
    <p>&copy; 2026 ERGO GYM BRATISLAVA | Všetky práva vyhradené.</p>
</footer>

<script>
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('nav-links');

    hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('active');
        navLinks.classList.toggle('active');
    });

    window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
    formspree('initForm', { 
        formElement: '#contact-form', 
        formId: 'xkopdvwl'
    });
</script>
<script src="https://unpkg.com/@formspree/ajax@1" defer></script>
</body>
</html>
